name: Bench

on:
  push:
    branches: [main]
    paths:
      - "bench/**"
      - "app/bench/**"
      - "components/TopNav.tsx"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/bench.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Trusted benchmark run
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout trusted ref
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test benchmark runner
        run: npm run bench:test

      - name: Validate benchmark agents
        run: npm run bench:validate

      - name: Run tournament and write static results
        run: npm run bench:run

      - name: Build app
        run: npm run build

      - name: Upload static benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: |
            bench/results/**/*.json
            bench/agents.json
            spec.md
          retention-days: 90