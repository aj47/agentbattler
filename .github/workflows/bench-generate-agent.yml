name: Bench Generate Agent

on:
  workflow_dispatch:
    inputs:
      agent_slug:
        description: "Agent slug to generate"
        required: true
        default: "auggie-claude-sonnet-46"
      auggie_model:
        description: "Auggie model id. Claude Sonnet 4.6 is sonnet4.6"
        required: true
        default: "sonnet4.6"
      timeout_minutes:
        description: "Auggie run timeout in minutes"
        required: true
        default: "30"

permissions:
  contents: read

jobs:
  generate:
    name: Generate chess agent with Auggie
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BENCH_AGENT_SLUG: ${{ inputs.agent_slug }}
      AUGGIE_MODEL: ${{ inputs.auggie_model }}
      AUGGIE_TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
      ARTIFACT_DIR: bench/generation/artifacts/${{ github.run_id }}-${{ inputs.agent_slug }}
      AUGMENT_SESSION_AUTH: ${{ secrets.AUGMENT_SESSION_AUTH }}
    steps:
      - name: Checkout trusted ref
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Auggie CLI
        run: npm install -g @augmentcode/auggie

      - name: Verify Auggie model id
        run: |
          auggie model list | tee model-list.txt
          grep -q "\[${AUGGIE_MODEL}\]" model-list.txt

      - name: Require Augment auth secret
        run: |
          test -n "$AUGMENT_SESSION_AUTH" || {
            echo "Missing AUGMENT_SESSION_AUTH secret" >&2
            exit 1
          }

      - name: Run Auggie non-interactive generation
        continue-on-error: true
        run: bash bench/generation/run-auggie-generation.sh

      - name: Require generated agent output
        run: |
          test -f "bench/agents/${BENCH_AGENT_SLUG}.js"
          node -e "const m=require('./bench/agents.json'); if (!m.agents?.some(a => a.slug === process.env.BENCH_AGENT_SLUG && a.path === 'bench/agents/' + process.env.BENCH_AGENT_SLUG + '.js')) process.exit(1)"

      - name: Save model list with artifacts
        if: always()
        run: |
          mkdir -p "$ARTIFACT_DIR"
          cp model-list.txt "$ARTIFACT_DIR/model-list.txt" || true

      - name: Test benchmark runner
        run: |
          set -o pipefail
          mkdir -p "$ARTIFACT_DIR"
          npm run bench:test | tee "$ARTIFACT_DIR/bench-test.log"

      - name: Validate generated benchmark agents
        run: |
          set -o pipefail
          mkdir -p "$ARTIFACT_DIR"
          npm run bench:validate | tee "$ARTIFACT_DIR/bench-validate.log"

      - name: Dry-run tournament
        run: |
          set -o pipefail
          npm --silent run bench:run:dry | tee "$ARTIFACT_DIR/bench-run-dry.json"
          python3 -m json.tool "$ARTIFACT_DIR/bench-run-dry.json" >/dev/null

      - name: Build app
        run: |
          set -o pipefail
          npm run build | tee "$ARTIFACT_DIR/bench-build.log"

      - name: Write generation summary
        if: always()
        run: |
          mkdir -p "$ARTIFACT_DIR"
          {
            echo "# Agent Generation"
            echo
            echo "- Agent slug: \`${BENCH_AGENT_SLUG}\`"
            echo "- Auggie model id: \`${AUGGIE_MODEL}\`"
            echo "- Artifact: \`generated-agent-${{ github.run_id }}-${{ inputs.agent_slug }}\`"
            echo "- Prompt: \`${ARTIFACT_DIR}/prompt.md\`"
            echo "- Transcript: \`${ARTIFACT_DIR}/auggie-transcript.log\`"
            echo "- Generated agent: \`bench/agents/${BENCH_AGENT_SLUG}.js\`"
            if [ -f "bench/agents/${BENCH_AGENT_SLUG}.js" ]; then
              echo "- Source bytes: \`$(wc -c < "bench/agents/${BENCH_AGENT_SLUG}.js")\`"
            fi
            echo
            echo "The artifact contains the prompt, full transcript, generated source, manifest, validation log, and dry-run output."
          } | tee "$ARTIFACT_DIR/generation-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload generation artifact to Convex storage
        if: always()
        env:
          CONVEX_BENCH_UPLOAD_URL: ${{ secrets.CONVEX_BENCH_UPLOAD_URL }}
          BENCH_UPLOAD_TOKEN: ${{ secrets.BENCH_UPLOAD_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CONVEX_BENCH_UPLOAD_URL}" ] || [ -z "${BENCH_UPLOAD_TOKEN}" ]; then
            echo "Skipping Convex generation upload; CONVEX_BENCH_UPLOAD_URL or BENCH_UPLOAD_TOKEN is not configured."
            exit 0
          fi

          upload_url="${CONVEX_BENCH_UPLOAD_URL%/upload}/generation/upload"
          public_dir="bench/generation/public-artifacts"
          artifact_name="generated-agent-${GITHUB_RUN_ID}-${BENCH_AGENT_SLUG}"
          archive="${public_dir}/${artifact_name}.tgz"
          source_path="bench/agents/${BENCH_AGENT_SLUG}.js"
          mkdir -p "$public_dir" "$ARTIFACT_DIR"

          paths=("$ARTIFACT_DIR" "bench/agents.json")
          if [ -f "$source_path" ]; then paths+=("$source_path"); fi
          tar -czf "$archive" "${paths[@]}"

          sha256="$(sha256sum "$archive" | awk '{print $1}')"
          source_size_bytes=0
          status="failed"
          if [ -f "$source_path" ]; then
            source_size_bytes="$(wc -c < "$source_path" | tr -d ' ')"
            status="generated"
          fi
          if [ -f "$source_path" ] && [ -f "$ARTIFACT_DIR/bench-build.log" ]; then
            status="complete"
          fi

          GENERATION_ARTIFACT_SHA256="$sha256" \
          GENERATION_SOURCE_SIZE_BYTES="$source_size_bytes" \
          GENERATION_STATUS="$status" \
          GENERATION_ARTIFACT_NAME="$artifact_name" \
          node <<'NODE'
          const fs = require("fs");
          const metadata = {
            generationId: `${process.env.GITHUB_RUN_ID}-${process.env.BENCH_AGENT_SLUG}`,
            agentSlug: process.env.BENCH_AGENT_SLUG,
            status: process.env.GENERATION_STATUS,
            generatedAt: new Date().toISOString(),
            auggieModel: process.env.AUGGIE_MODEL,
            timeoutMinutes: Number(process.env.AUGGIE_TIMEOUT_MINUTES || 30),
            artifactName: process.env.GENERATION_ARTIFACT_NAME,
            storageSha256: process.env.GENERATION_ARTIFACT_SHA256,
            sourceSizeBytes: Number(process.env.GENERATION_SOURCE_SIZE_BYTES || 0),
            repository: process.env.GITHUB_REPOSITORY,
            githubRunId: process.env.GITHUB_RUN_ID,
            githubSha: process.env.GITHUB_SHA,
            githubRef: process.env.GITHUB_REF_NAME,
            workflowUrl: `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            promptPath: `${process.env.ARTIFACT_DIR}/prompt.md`,
            transcriptPath: `${process.env.ARTIFACT_DIR}/auggie-transcript.log`,
            sourcePath: `bench/agents/${process.env.BENCH_AGENT_SLUG}.js`,
          };
          fs.writeFileSync(`${process.env.ARTIFACT_DIR}/convex-generation-metadata.json`, JSON.stringify(metadata, null, 2));
          NODE

          metadata_b64="$(base64 "$ARTIFACT_DIR/convex-generation-metadata.json" | tr -d '\n')"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${BENCH_UPLOAD_TOKEN}" \
            --header "Content-Type: application/gzip" \
            --header "X-Benchmark-Metadata: ${metadata_b64}" \
            --data-binary "@${archive}" \
            "${upload_url}" \
            | tee "$ARTIFACT_DIR/convex-generation-upload-response.json"

          echo "Public Convex generation artifact uploaded: ${artifact_name}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload prompt, logs, and generated agent
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-agent-${{ github.run_id }}-${{ inputs.agent_slug }}
          path: |
            ${{ env.ARTIFACT_DIR }}/**/*
            bench/agents/${{ inputs.agent_slug }}.js
            bench/agents.json
          retention-days: 90